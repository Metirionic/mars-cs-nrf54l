name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  build-initiator:
    name: Build initiator
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.3.0
    env:
      NCS_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install dependencies
        run: |
          rm -f /opt/ncs/toolchains/*/usr/lib/x86_64-linux-gnu/libnghttp2.so.14
          apt-get update && apt-get install -y --no-install-recommends curl

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            ../zephyr
            ../nrf
            ../bootloader
            ../modules
            ../nrfxlib
            ../test
            ../tools
          key: ncs-v3.3.0-${{ hashFiles('west.yml') }}

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo
            /root/.rustup
          key: rust-stable-thumbv8m.main-none-eabihf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf

      - name: Init west workspace
        run: |
          west init -l . --mf west.yml 2>/dev/null || true
          west update -o=--depth=1 -n

      - name: Build initiator (nrf54l15dk central A1 1-path)
        run: |
          bash ci/build.sh --target initiator --preset nrf54l15dk_cent_a1_1

  build-reflector:
    name: Build reflector
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.3.0
    env:
      NCS_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install dependencies
        run: |
          rm -f /opt/ncs/toolchains/*/usr/lib/x86_64-linux-gnu/libnghttp2.so.14
          apt-get update && apt-get install -y --no-install-recommends curl

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            ../zephyr
            ../nrf
            ../bootloader
            ../modules
            ../nrfxlib
            ../test
            ../tools
          key: ncs-v3.3.0-${{ hashFiles('west.yml') }}

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo
            /root/.rustup
          key: rust-stable-thumbv8m.main-none-eabihf

      - name: Init west workspace
        run: |
          west init -l . --mf west.yml 2>/dev/null || true
          west update -o=--depth=1 -n

      - name: Build reflector (nrf54l15dk peripheral A1 4-path)
        run: |
          bash ci/build.sh --target reflector --preset nrf54l15dk_peri_a1_4
