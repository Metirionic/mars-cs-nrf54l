name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  build-initiator:
    name: Build initiator
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.3.0
    env:
      NCS_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install dependencies
        run: |
          rm -f /opt/ncs/toolchains/*/usr/lib/x86_64-linux-gnu/libnghttp2.so.14
          apt-get update && apt-get install -y --no-install-recommends curl

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf

      - name: Init west workspace
        run: |
          west init -l . --mf west.yml
          west update -o=--depth=1 -n

      - name: Build initiator (nrf54l15dk central A1 1-path)
        run: |
          bash ci/build.sh --target initiator --preset nrf54l15dk_cent_a1_1

  build-reflector:
    name: Build reflector
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.3.0
    env:
      NCS_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install dependencies
        run: |
          rm -f /opt/ncs/toolchains/*/usr/lib/x86_64-linux-gnu/libnghttp2.so.14
          apt-get update && apt-get install -y --no-install-recommends curl

      - name: Init west workspace
        run: |
          west init -l . --mf west.yml
          west update -o=--depth=1 -n

      - name: Build reflector (nrf54l15dk peripheral A1 4-path)
        run: |
          bash ci/build.sh --target reflector --preset nrf54l15dk_peri_a1_4

  onboarding-verification:
    name: Onboarding verification (clean OS, native toolchain)
    runs-on: ubuntu-24.04
    container: ubuntu:24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Install minimal pre-checkout packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure workspace env
        # Use the $GITHUB_WORKSPACE env var (the in-container path, e.g.
        # /__w/<repo>/<repo>), NOT the ${{ github.workspace }} expression: in
        # container jobs the expression resolves to the runner host path which
        # is not valid inside the container, so NCS_DIR would point nowhere.
        run: |
          echo "WS_PARENT=$(dirname "$GITHUB_WORKSPACE")" >> "$GITHUB_ENV"
          echo "NCS_DIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Cache Zephyr SDK (ARM-only, no host tools)
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk-*
          key: zephyr-sdk-arm-no-hosttools-${{ hashFiles('west.yml') }}-${{ runner.os }}

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WS_PARENT }}/.west
            ${{ env.WS_PARENT }}/nrf
            ${{ env.WS_PARENT }}/zephyr
            ${{ env.WS_PARENT }}/nrfxlib
            ${{ env.WS_PARENT }}/modules
            ${{ env.WS_PARENT }}/bootloader
            ${{ env.WS_PARENT }}/test
            ${{ env.WS_PARENT }}/tools
          key: ncs-ws-v3.3.0-v2-${{ hashFiles('west.yml') }}
          restore-keys: ncs-ws-v3.3.0-

      - name: Cache NCS venv
        uses: actions/cache@v4
        with:
          path: ~/.ncs-venv
          # Bump the `v1` segment whenever the `setuptools<81` constraint in
          # scripts/install-toolchain.sh (create_venv's bootstrap pip install)
          # or the venv layout changes, so the cache is rebuilt fresh.
          key: ncs-venv-v3.3.0-v1-${{ runner.os }}-${{ hashFiles('west.yml') }}
          restore-keys: |
            ncs-venv-v3.3.0-v1-${{ runner.os }}-

      - name: Install native toolchain (documented path)
        run: bash scripts/install-toolchain.sh --with-rust

      - name: Build reflector (nrf54l15dk peripheral A1 4-path)
        run: |
          source "$HOME/.ncs-venv/bin/activate"
          bash ci/build.sh --target reflector --preset nrf54l15dk_peri_a1_4 --release-dir release

      - name: Upload reflector merged firmware
        # Upload each target's artifact immediately after its build, so a
        # failure in the other build (e.g. the initiator's cargo path) cannot
        # drop an artifact that was built successfully.
        uses: actions/upload-artifact@v4
        with:
          name: reflector-onboarding-merged
          path: release/reflector_*.hex
          if-no-files-found: error

      - name: Build initiator (nrf54l15dk central A1 1-path)
        # The install script provisions rustup into ~/.cargo, but its
        # `source ~/.cargo/env` does not persist to this step (Actions runs
        # bash --noprofile --norc), so cargo must be put on PATH here for
        # CMake -> find_package(mars-bluetooth-hci-rust) -> cargo build.
        run: |
          source "$HOME/.ncs-venv/bin/activate"
          source "$HOME/.cargo/env"
          bash ci/build.sh --target initiator --preset nrf54l15dk_cent_a1_1 --release-dir release

      - name: Upload initiator merged firmware
        uses: actions/upload-artifact@v4
        with:
          name: initiator-onboarding-merged
          path: release/initiator_*.hex
          if-no-files-found: error
