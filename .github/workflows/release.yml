name: Release

on:
  push:
    branches: [main]

jobs:
  version-bump:
    name: Version bump
    runs-on: ubuntu-latest
    outputs:
      bump_needed: ${{ steps.check.outputs.bump_needed }}
      tag: ${{ steps.tag.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@main
        with:
          install-only: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for version bump
        id: check
        run: |
          if cog bump --auto --dry-run 2>/dev/null; then
            echo "bump_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "bump_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Semver release
        if: steps.check.outputs.bump_needed == 'true'
        run: cog bump --auto

      - name: Push version bump commit and tags
        if: steps.check.outputs.bump_needed == 'true'
        run: |
          git push
          git push --tags

      - name: Get new tag
        if: steps.check.outputs.bump_needed == 'true'
        id: tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

  build:
    name: Build firmware
    needs: version-bump
    if: needs.version-bump.outputs.bump_needed == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.3.0
    env:
      NCS_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag }}

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install dependencies
        run: |
          rm -f /opt/ncs/toolchains/*/usr/lib/x86_64-linux-gnu/libnghttp2.so.14
          apt-get update && apt-get install -y --no-install-recommends curl zip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf

      - name: Init west workspace
        run: |
          west init -l . --mf west.yml
          west update -o=--depth=1 -n

      - name: Build all firmware
        run: |
          # Initiator presets
          bash ci/build.sh --target initiator --preset nrf54l15dk_cent_a1_1,ublox_cent_a1_1,ezurio_bl54l15u_cent_a2_4,fanstel_bm15c_cent_a1_1 --release-dir release

          # Reflector presets
          bash ci/build.sh --target reflector --preset nrf54l15dk_peri_a1_4,ezurio_bl54l15u_peri_a2_4,fanstel_bm15c_peri_a1_4,ublox_peri_a1_4 --release-dir release

      - name: Package firmware
        run: zip -j cs-ranging-firmware.zip release/*.hex

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs-ranging-firmware
          path: cs-ranging-firmware.zip

  release:
    name: Create GitHub Release
    needs: [version-bump, build]
    if: needs.version-bump.outputs.bump_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag }}

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: cs-ranging-firmware

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.tag }}
          files: cs-ranging-firmware.zip
          generate_release_notes: true
