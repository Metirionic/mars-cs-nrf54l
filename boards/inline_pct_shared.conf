# SPDX-License-Identifier: MIT
#
# Shared Inline PCT (IPT) configuration fragment, applied to BOTH the
# initiator and reflector IPT builds via EXTRA_CONF_FILE.
#
# CONFIG_BT_DEVICE_NAME is the single source of truth for the IPT reflector's
# advertised name. The reflector advertises it (reflector/src/main.c); the
# initiator scans for it (common/ble_scanning.c). Rename here once and both
# sides update — there is no separately-typed C literal.
CONFIG_BT_DEVICE_NAME="Nordic CS IPT Reflector"
