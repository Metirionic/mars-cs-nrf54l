# SPDX-License-Identifier: MIT
#
# Inline PCT (IPT) mode configuration fragment for the reflector.
#
# This file is appended via EXTRA_CONF_FILE to override the ras-style
# defaults from prj.conf. Zephyr applies EXTRA_CONF_FILE after CONF_FILE,
# so settings here take precedence.

# Enable inline PCT mode and the controller CS Enhancements it requires.
CONFIG_MARS_CS_INLINE_PCT=y
CONFIG_BT_CTLR_EXTENDED_FEAT_SET=y

# RAS Ranging Service responder is not used in IPT mode.
CONFIG_BT_RAS=n
CONFIG_BT_RAS_RRSP=n
CONFIG_BT_RAS_MODE_3_SUPPORTED=n

# Advertise the IPT reflector name so the initiator can discover it by name.
CONFIG_BT_DEVICE_NAME="Nordic CS IPT Reflector"
