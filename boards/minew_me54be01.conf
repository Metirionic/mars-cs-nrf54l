# Minewsemi ME54BE01 board console config. The ME54BE01 (ME54BS01-nRF54L15
# module) has a single UART — uart20, the COBS ranging stream (cobs-uart) —
# routed to the onboard USB-to-serial bridge over Type-C. There is no
# console/shell UART: the console (log output) runs over Segger RTT via an
# external J-Link debug probe (the ME54BE01 has no onboard debugger), matching
# the nrf54l15tag.conf pattern.
#
# Unlike the nrf54l15tag (whose defconfig sets neither UART_CONSOLE nor SERIAL),
# the ME54BE01 builds on the nrf54l15dk board defconfig, which sets both
# CONFIG_UART_CONSOLE=y and CONFIG_SERIAL=y. The overlay defines no
# zephyr,console chosen node (RTT console), so UART_CONSOLE must be explicitly
# disabled here — otherwise zephyr/drivers/console/uart_console.c references the
# missing zephyr,console node (DEVICE_DT_GET(DT_CHOSEN(zephyr_console))) and the
# build fails. CONFIG_SERIAL is left at its DK defconfig default (y); the
# uart20 cobs-uart device the initiator's serialize.c acquires still
# instantiates. These lines mirror Zephyr's rtt-console snippet
# (CONFIG_USE_SEGGER_RTT is the dependency CONFIG_RTT_CONSOLE requires).
CONFIG_USE_SEGGER_RTT=y
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n