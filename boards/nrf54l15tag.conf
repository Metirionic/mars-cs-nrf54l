# nRF54L15 TAG board console config. The TAG has a single UART (uart20, used
# for the COBS ranging stream via cobs-uart) and no onboard USB, so there is no
# console/shell UART: console, shell, mcumgr, bt-mon, and bt-c2h run over Segger
# RTT via the debug probe (J-Link through the DK DEBUG OUT header), matching
# Nordic's nrf54l15tag board guidance.
#
# CONFIG_SERIAL is app-level (set in initiator/prj.conf) — the initiator's COBS
# transport requires the cobs-uart device. The nrf54l15dk board defconfig provides
# CONFIG_UART_CONSOLE for the DK's UART console; the tag has no console UART, so
# UART_CONSOLE stays at its default (n) and the RTT backend is selected here.
# These lines mirror Zephyr's rtt-console snippet (CONFIG_USE_SEGGER_RTT is the
# dependency CONFIG_RTT_CONSOLE requires).
CONFIG_USE_SEGGER_RTT=y
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
