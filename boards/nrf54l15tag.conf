# The nrf54l15tag board defconfig enables only GPIO + ARM_MPU: its default
# console path is Segger RTT, not a UART, and the board defconfig does not turn
# on CONFIG_SERIAL. The tag exposes a single UART — &uart20, bound to cobs-uart
# in the tag overlay — which must be driven by the UART driver so the device the
# initiator's src/serialize.c acquires via DEVICE_DT_GET(DT_CHOSEN(cobs_uart))
# is instantiated (otherwise the link fails with an undefined
# __device_dts_ord_<N>). There is no second UART, so console/shell/mcumgr run
# over Segger RTT via the debug probe instead of a UART console. The RTT
# console lines mirror Zephyr's rtt-console snippet (CONFIG_USE_SEGGER_RTT is
# the dependency CONFIG_RTT_CONSOLE requires).
CONFIG_SERIAL=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
