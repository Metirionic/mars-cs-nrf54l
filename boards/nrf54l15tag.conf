# The nrf54l15tag board defconfig enables only GPIO + ARM_MPU: its default
# console path is Segger RTT, not a UART. The tag overlay binds cobs-uart to
# &uart20 and the shell/console to &uart30 and enables both, so the UART
# driver + console must be turned on here for those device instances to exist
# (otherwise DEVICE_DT_GET(DT_CHOSEN(cobs_uart)) in src/serialize.c fails to
# link with an undefined __device_dts_ord_<N>). The nrf54l15dk board defconfig
# provides these for the DK presets; mirror them for the tag.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
