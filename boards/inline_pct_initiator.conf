# SPDX-License-Identifier: MIT
#
# Inline PCT (IPT) mode configuration fragment for the initiator.
#
# This file is appended via EXTRA_CONF_FILE to override the ras-style
# defaults from prj.conf / central.overlay. Zephyr applies EXTRA_CONF_FILE
# after CONF_FILE, so settings here take precedence.

# Enable inline PCT mode and the controller CS Enhancements it requires.
CONFIG_MARS_CS_INLINE_PCT=y

# RAS Ranging Service is not used in IPT mode.
CONFIG_BT_RAS=n
CONFIG_BT_RAS_RREQ=n
CONFIG_BT_RAS_MODE_3_SUPPORTED=n

# No GATT client / large MTU required: the reflector's PCT contribution is
# embedded in the local tones, so there is no RAS ranging-data transfer.
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_GATT_DYNAMIC_DB=n
CONFIG_BT_SCAN_UUID_CNT=0
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_ATT_PREPARE_COUNT=3
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Discover the IPT reflector by advertised name instead of the Ranging Service
# UUID (the reflector does not advertise that UUID in IPT mode).
CONFIG_BT_SCAN_NAME_CNT=1